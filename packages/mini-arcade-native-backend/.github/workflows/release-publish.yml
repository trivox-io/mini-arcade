name: Hotfix Patch Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-release:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.head_commit.message == '' || !startsWith(github.event.head_commit.message, 'chore(release):') }}
    uses: trivox-io/mini-arcade/.github/workflows/reusable-release-package.yml@main
    with:
      project_name: mini-arcade-native-backend
      working_directory: .
      version_file: pyproject.toml
      bump_type: patch
      merge_develop_into_main: false
      sync_develop_from_main: true
      tag_prefix: mini-arcade-native-backend
      apt_deps: "libsdl2-dev libsdl2-ttf-dev libsdl2-mixer-dev"
      build_windows_wheels: true
      build_command: "python -m build --sdist"
    secrets:
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
