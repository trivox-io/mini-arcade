name: Release Packages (Major/Minor/Patch)

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      subtree_repo_owner:
        description: "Owner for subtree mirror repos (leave empty to use current repo owner)"
        required: false
        default: "alexsc6955"
        type: string

permissions:
  contents: write

jobs:
  release:
    uses: ./.github/workflows/reusable-release-stack.yml
    with:
      bump_type: ${{ inputs.bump_type }}
      stable_branch: main
      develop_branch: develop
      subtree_repo_owner: ${{ inputs.subtree_repo_owner }}
    secrets: inherit

