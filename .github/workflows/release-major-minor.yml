name: Release Packages (Major/Minor)

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - minor
          - major

permissions:
  contents: write

jobs:
  release_core:
    uses: ./.github/workflows/reusable-release-package.yml
    with:
      project_name: mini-arcade-core
      working_directory: packages/mini-arcade-core
      version_file: pyproject.toml
      bump_type: ${{ inputs.bump_type }}
      merge_develop_into_main: true
      sync_develop_from_main: false
      tag_prefix: mini-arcade-core
    secrets: inherit

  align_backend_core_deps:
    needs: [release_core]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Align backend dependency on core
        env:
          CORE_VERSION: ${{ needs.release_core.outputs.version }}
        run: |
          set -e

          python - << 'PY'
          from pathlib import Path
          import os

          core_version = os.environ["CORE_VERSION"]
          major = int(core_version.split(".")[0])
          spec = f">={core_version},<{major + 1}.0.0"

          targets = [
              Path("packages/mini-arcade-pygame-backend/pyproject.toml"),
              Path("packages/mini-arcade-native-backend/pyproject.toml"),
          ]

          for path in targets:
              lines = path.read_text(encoding="utf-8").splitlines()
              updated = False
              for idx, line in enumerate(lines):
                  if '"mini-arcade-core' in line:
                      prefix = line[: len(line) - len(line.lstrip())]
                      suffix = "," if line.rstrip().endswith(",") else ""
                      lines[idx] = f'{prefix}"mini-arcade-core ({spec})"{suffix}'
                      updated = True
              if not updated:
                  raise SystemExit(f"Could not update mini-arcade-core in {path}")
              path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Commit dependency alignment
        run: |
          set -e
          git add packages/mini-arcade-pygame-backend/pyproject.toml packages/mini-arcade-native-backend/pyproject.toml
          if git diff --cached --quiet; then
            echo "No dependency changes"
            exit 0
          fi
          git commit -m "chore(release): align backends with mini-arcade-core ${{ needs.release_core.outputs.version }}"
          git push origin main

  release_pygame:
    needs: [align_backend_core_deps]
    uses: ./.github/workflows/reusable-release-package.yml
    with:
      project_name: mini-arcade-pygame-backend
      working_directory: packages/mini-arcade-pygame-backend
      version_file: pyproject.toml
      bump_type: ${{ inputs.bump_type }}
      merge_develop_into_main: false
      sync_develop_from_main: false
      tag_prefix: mini-arcade-pygame-backend
    secrets: inherit

  release_native:
    needs: [release_pygame]
    uses: ./.github/workflows/reusable-release-package.yml
    with:
      project_name: mini-arcade-native-backend
      working_directory: packages/mini-arcade-native-backend
      version_file: pyproject.toml
      bump_type: ${{ inputs.bump_type }}
      merge_develop_into_main: false
      sync_develop_from_main: false
      tag_prefix: mini-arcade-native-backend
      apt_deps: "libsdl2-dev libsdl2-ttf-dev libsdl2-mixer-dev"
      build_windows_wheels: true
      build_command: "python -m build --sdist"
    secrets: inherit

  align_mini_arcade_deps:
    needs: [release_core, release_pygame, release_native]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Align mini-arcade dependencies
        env:
          CORE_VERSION: ${{ needs.release_core.outputs.version }}
          PYGAME_VERSION: ${{ needs.release_pygame.outputs.version }}
          NATIVE_VERSION: ${{ needs.release_native.outputs.version }}
        run: |
          set -e

          python - << 'PY'
          from pathlib import Path
          import os

          versions = {
              "mini-arcade-core": os.environ["CORE_VERSION"],
              "mini-arcade-pygame-backend": os.environ["PYGAME_VERSION"],
              "mini-arcade-native-backend": os.environ["NATIVE_VERSION"],
          }

          path = Path("packages/mini-arcade/pyproject.toml")
          lines = path.read_text(encoding="utf-8").splitlines()

          for dep_name, dep_version in versions.items():
              major = int(dep_version.split(".")[0])
              spec = f">={dep_version},<{major + 1}.0.0"
              updated = False
              for idx, line in enumerate(lines):
                  if f'"{dep_name}' in line:
                      prefix = line[: len(line) - len(line.lstrip())]
                      suffix = "," if line.rstrip().endswith(",") else ""
                      lines[idx] = f'{prefix}"{dep_name} ({spec})"{suffix}'
                      updated = True
              if not updated:
                  raise SystemExit(f"Could not update {dep_name} in {path}")

          path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Commit mini-arcade dependency alignment
        run: |
          set -e
          git add packages/mini-arcade/pyproject.toml
          if git diff --cached --quiet; then
            echo "No dependency changes"
            exit 0
          fi
          git commit -m "chore(release): align mini-arcade deps"
          git push origin main

  release_mini_arcade:
    needs: [align_mini_arcade_deps]
    uses: ./.github/workflows/reusable-release-package.yml
    with:
      project_name: mini-arcade
      working_directory: packages/mini-arcade
      version_file: pyproject.toml
      bump_type: ${{ inputs.bump_type }}
      merge_develop_into_main: false
      sync_develop_from_main: true
      tag_prefix: mini-arcade
    secrets: inherit
