name: Release Packages (Major/Minor/Patch)

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    uses: ./.github/workflows/reusable-release-stack.yml
    with:
      bump_type: ${{ inputs.bump_type }}
      stable_branch: main
      develop_branch: develop
    secrets: inherit

