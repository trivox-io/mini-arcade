name: CI

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "hotfix/**"
  pull_request:
    branches:
      - main
      - develop

jobs:
  python-ci:
    strategy:
      fail-fast: false
      matrix:
        include:
          - project_name: "mini-arcade"
            working_directory: "packages/mini-arcade"
            lint_path: "src/mini_arcade"
            apt_deps: "libsdl2-dev libsdl2-ttf-dev libsdl2-mixer-dev"
            run_pytest: false
            local_dependency_paths: >-
              ["$GITHUB_WORKSPACE/packages/mini-arcade-core",
               "$GITHUB_WORKSPACE/packages/mini-arcade-pygame-backend",
               "$GITHUB_WORKSPACE/packages/mini-arcade-native-backend"]

          - project_name: "mini-arcade-core"
            working_directory: "packages/mini-arcade-core"
            lint_path: "src/mini_arcade_core"
            apt_deps: ""
            run_pytest: true
            local_dependency_paths: "[]"

          - project_name: "mini-arcade-pygame-backend"
            working_directory: "packages/mini-arcade-pygame-backend"
            lint_path: "src/mini_arcade_pygame_backend"
            apt_deps: ""
            run_pytest: true
            local_dependency_paths: >-
              ["$GITHUB_WORKSPACE/packages/mini-arcade-core"]

          - project_name: "mini-arcade-native-backend"
            working_directory: "packages/mini-arcade-native-backend"
            lint_path: "src/mini_arcade_native_backend"
            apt_deps: "libsdl2-dev libsdl2-ttf-dev libsdl2-mixer-dev"
            run_pytest: true
            local_dependency_paths: >-
              ["$GITHUB_WORKSPACE/packages/mini-arcade-core"]

    uses: ./.github/workflows/reusable-python-ci.yml
    with:
      project_name: ${{ matrix.project_name }}
      working_directory: ${{ matrix.working_directory }}
      lint_path: ${{ matrix.lint_path }}
      apt_deps: ${{ matrix.apt_deps }}
      run_pytest: ${{ matrix.run_pytest }}
      local_dependency_paths: ${{ matrix.local_dependency_paths }}
