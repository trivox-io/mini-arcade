name: Hotfix Patch Release

on:
  push:
    branches:
      - main
    paths:
      - "packages/**"

permissions:
  contents: write

jobs:
  detect_changes:
    if: ${{ github.event.head_commit.message == '' || !startsWith(github.event.head_commit.message, 'chore(release):') }}
    runs-on: ubuntu-latest
    outputs:
      core_changed: ${{ steps.diff.outputs.core_changed }}
      pygame_changed: ${{ steps.diff.outputs.pygame_changed }}
      native_changed: ${{ steps.diff.outputs.native_changed }}
      mini_changed: ${{ steps.diff.outputs.mini_changed }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed packages
        id: diff
        env:
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
        run: |
          set -e

          before="$BEFORE"
          after="$AFTER"

          if [ "$before" = "0000000000000000000000000000000000000000" ]; then
            before="${after}^"
          fi

          files=$(git diff --name-only "$before" "$after" || true)

          echo "$files"

          core_changed=false
          pygame_changed=false
          native_changed=false
          mini_changed=false

          if echo "$files" | grep -q '^packages/mini-arcade-core/'; then
            core_changed=true
          fi
          if echo "$files" | grep -q '^packages/mini-arcade-pygame-backend/'; then
            pygame_changed=true
          fi
          if echo "$files" | grep -q '^packages/mini-arcade-native-backend/'; then
            native_changed=true
          fi
          if echo "$files" | grep -q '^packages/mini-arcade/'; then
            mini_changed=true
          fi

          echo "core_changed=$core_changed" >> "$GITHUB_OUTPUT"
          echo "pygame_changed=$pygame_changed" >> "$GITHUB_OUTPUT"
          echo "native_changed=$native_changed" >> "$GITHUB_OUTPUT"
          echo "mini_changed=$mini_changed" >> "$GITHUB_OUTPUT"

  patch_core:
    needs: [detect_changes]
    if: ${{ needs.detect_changes.outputs.core_changed == 'true' }}
    uses: ./.github/workflows/reusable-release-package.yml
    with:
      project_name: mini-arcade-core
      working_directory: packages/mini-arcade-core
      version_file: pyproject.toml
      bump_type: patch
      merge_develop_into_main: false
      sync_develop_from_main: false
      tag_prefix: mini-arcade-core
    secrets: inherit

  patch_pygame:
    needs: [detect_changes, patch_core]
    if: ${{ needs.detect_changes.outputs.pygame_changed == 'true' }}
    uses: ./.github/workflows/reusable-release-package.yml
    with:
      project_name: mini-arcade-pygame-backend
      working_directory: packages/mini-arcade-pygame-backend
      version_file: pyproject.toml
      bump_type: patch
      merge_develop_into_main: false
      sync_develop_from_main: false
      tag_prefix: mini-arcade-pygame-backend
    secrets: inherit

  patch_native:
    needs: [detect_changes, patch_pygame]
    if: ${{ needs.detect_changes.outputs.native_changed == 'true' }}
    uses: ./.github/workflows/reusable-release-package.yml
    with:
      project_name: mini-arcade-native-backend
      working_directory: packages/mini-arcade-native-backend
      version_file: pyproject.toml
      bump_type: patch
      merge_develop_into_main: false
      sync_develop_from_main: false
      tag_prefix: mini-arcade-native-backend
      apt_deps: "libsdl2-dev libsdl2-ttf-dev libsdl2-mixer-dev"
      build_windows_wheels: true
      build_command: "python -m build --sdist"
    secrets: inherit

  align_mini_arcade_deps:
    needs: [detect_changes, patch_core, patch_pygame, patch_native]
    if: ${{ always() && (needs.patch_core.result == 'success' || needs.patch_pygame.result == 'success' || needs.patch_native.result == 'success') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Align mini-arcade dependency floors
        env:
          CORE_VERSION: ${{ needs.patch_core.outputs.version }}
          PYGAME_VERSION: ${{ needs.patch_pygame.outputs.version }}
          NATIVE_VERSION: ${{ needs.patch_native.outputs.version }}
        run: |
          set -e

          python - << 'PY'
          from pathlib import Path
          import os

          updates = {}
          if os.environ.get("CORE_VERSION"):
              updates["mini-arcade-core"] = os.environ["CORE_VERSION"]
          if os.environ.get("PYGAME_VERSION"):
              updates["mini-arcade-pygame-backend"] = os.environ["PYGAME_VERSION"]
          if os.environ.get("NATIVE_VERSION"):
              updates["mini-arcade-native-backend"] = os.environ["NATIVE_VERSION"]

          if not updates:
              raise SystemExit(0)

          path = Path("packages/mini-arcade/pyproject.toml")
          lines = path.read_text(encoding="utf-8").splitlines()

          for dep_name, dep_version in updates.items():
              major = int(dep_version.split(".")[0])
              spec = f">={dep_version},<{major + 1}.0.0"
              for idx, line in enumerate(lines):
                  if f'"{dep_name}' in line:
                      prefix = line[: len(line) - len(line.lstrip())]
                      suffix = "," if line.rstrip().endswith(",") else ""
                      lines[idx] = f'{prefix}"{dep_name} ({spec})"{suffix}'
                      break

          path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Commit dependency alignment
        run: |
          set -e
          git add packages/mini-arcade/pyproject.toml
          if git diff --cached --quiet; then
            echo "No dependency changes"
            exit 0
          fi
          git commit -m "chore(release): align mini-arcade dependency floors"
          git push origin main

  patch_mini_arcade:
    needs: [detect_changes, align_mini_arcade_deps]
    if: ${{ always() && (needs.detect_changes.outputs.mini_changed == 'true' || needs.align_mini_arcade_deps.result == 'success') }}
    uses: ./.github/workflows/reusable-release-package.yml
    with:
      project_name: mini-arcade
      working_directory: packages/mini-arcade
      version_file: pyproject.toml
      bump_type: patch
      merge_develop_into_main: false
      sync_develop_from_main: true
      tag_prefix: mini-arcade
    secrets: inherit
