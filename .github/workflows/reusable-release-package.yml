name: Reusable Release Package

on:
  workflow_call:
    inputs:
      project_name:
        description: "Package/project name"
        required: true
        type: string
      working_directory:
        description: "Project root directory"
        required: false
        type: string
        default: "."
      version_file:
        description: "Version file path relative to working-directory"
        required: false
        type: string
        default: "pyproject.toml"
      bump_type:
        description: "Semver bump type"
        required: true
        type: string
      stable_branch:
        description: "Branch that represents the releasable state"
        required: false
        type: string
        default: "main"
      develop_branch:
        description: "Feature branch"
        required: false
        type: string
        default: "develop"
      merge_develop_into_main:
        description: "Merge develop into main before releasing"
        required: false
        type: boolean
        default: false
      sync_develop_from_main:
        description: "Merge main back into develop after successful release"
        required: false
        type: boolean
        default: true
      publish_to_pypi:
        description: "Publish artifacts to PyPI"
        required: false
        type: boolean
        default: true
      apt_deps:
        description: "Space-separated apt packages to install"
        required: false
        type: string
        default: ""
      python_version:
        description: "Python version for build/publish"
        required: false
        type: string
        default: "3.11"
      build_command:
        description: "Build command to run from working-directory"
        required: false
        type: string
        default: "python -m build"
      packages_dir:
        description: "Artifacts directory relative to working-directory"
        required: false
        type: string
        default: "dist"
      tag_prefix:
        description: "Tag prefix (default: project-name)"
        required: false
        type: string
        default: ""
      build_windows_wheels:
        description: "Build Windows wheels with cibuildwheel"
        required: false
        type: boolean
        default: false
      windows_vcpkg_packages:
        description: "vcpkg packages for Windows wheel build"
        required: false
        type: string
        default: "sdl2 sdl2-ttf sdl2-mixer"
      cibw_build:
        description: "cibuildwheel build selector"
        required: false
        type: string
        default: "cp39-win_amd64 cp310-win_amd64 cp311-win_amd64"
    secrets:
      PYPI_API_TOKEN:
        required: false

permissions:
  contents: write

outputs:
  version:
    value: ${{ jobs.prepare.outputs.version }}
  tag:
    value: ${{ jobs.prepare.outputs.tag }}
  ref:
    value: ${{ jobs.prepare.outputs.ref }}

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.tag.outputs.tag }}
      ref: ${{ steps.ref.outputs.ref }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.stable_branch }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch branches and tags
        run: |
          git fetch origin "${{ inputs.stable_branch }}" "${{ inputs.develop_branch }}" --tags

      - name: Merge develop into main
        if: ${{ inputs.merge_develop_into_main }}
        env:
          STABLE_BRANCH: ${{ inputs.stable_branch }}
          DEVELOP_BRANCH: ${{ inputs.develop_branch }}
        run: |
          set -e

          git checkout "$STABLE_BRANCH"
          git pull origin "$STABLE_BRANCH"
          git merge --no-ff "origin/$DEVELOP_BRANCH" -m "chore(release): merge $DEVELOP_BRANCH into $STABLE_BRANCH"
          git push origin "$STABLE_BRANCH"

      - name: Ensure stable branch is checked out
        env:
          STABLE_BRANCH: ${{ inputs.stable_branch }}
        run: |
          set -e
          git checkout "$STABLE_BRANCH"
          git pull origin "$STABLE_BRANCH"

      - name: Bump version
        id: bump
        env:
          BUMP_TYPE: ${{ inputs.bump_type }}
          WORKING_DIRECTORY: ${{ inputs.working_directory }}
          VERSION_FILE: ${{ inputs.version_file }}
          STABLE_BRANCH: ${{ inputs.stable_branch }}
          PROJECT_NAME: ${{ inputs.project_name }}
        run: |
          set -e

          python - << 'PY'
          from pathlib import Path
          import os
          import re
          import subprocess

          bump_type = os.environ["BUMP_TYPE"].strip().lower()
          working_directory = Path(os.environ["WORKING_DIRECTORY"])
          version_file = working_directory / os.environ["VERSION_FILE"]
          stable_branch = os.environ["STABLE_BRANCH"]
          project_name = os.environ["PROJECT_NAME"]

          if bump_type not in {"major", "minor", "patch"}:
              raise SystemExit(f"Unsupported bump type: {bump_type}")

          text = version_file.read_text(encoding="utf-8")
          match = re.search(r'^version\s*=\s*"(?P<ver>\d+\.\d+\.\d+)"', text, re.MULTILINE)
          if not match:
              raise SystemExit(f"Could not find version in {version_file}")

          current = match.group("ver")
          major, minor, patch = map(int, current.split("."))

          if bump_type == "major":
              major += 1
              minor = 0
              patch = 0
          elif bump_type == "minor":
              minor += 1
              patch = 0
          else:
              patch += 1

          new_version = f"{major}.{minor}.{patch}"

          new_text = re.sub(
              r'^version\s*=\s*"\d+\.\d+\.\d+"',
              f'version = "{new_version}"',
              text,
              count=1,
              flags=re.MULTILINE,
          )
          version_file.write_text(new_text, encoding="utf-8")

          subprocess.run(["git", "add", str(version_file)], check=True)
          subprocess.run(
              [
                  "git",
                  "commit",
                  "-m",
                  f"chore(release): {project_name} {bump_type} -> {new_version}",
              ],
              check=True,
          )
          subprocess.run(["git", "push", "origin", stable_branch], check=True)

          out = Path(os.environ["GITHUB_OUTPUT"])
          with out.open("a", encoding="utf-8") as fh:
              fh.write(f"version={new_version}\n")
          PY

      - name: Create and push release tag
        id: tag
        env:
          VERSION: ${{ steps.bump.outputs.version }}
          TAG_PREFIX: ${{ inputs.tag_prefix }}
          PROJECT_NAME: ${{ inputs.project_name }}
        run: |
          set -e

          prefix="$TAG_PREFIX"
          if [ -z "$prefix" ]; then
            prefix="$PROJECT_NAME"
          fi

          tag="${prefix}-v${VERSION}"

          git fetch --tags
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists"
            exit 1
          fi

          git tag "$tag"
          git push origin "$tag"

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Resolve release ref
        id: ref
        run: |
          echo "ref=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  wheels_windows:
    if: ${{ inputs.build_windows_wheels }}
    needs: [prepare]
    runs-on: windows-latest

    steps:
      - name: Checkout release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install vcpkg dependencies
        shell: pwsh
        env:
          VCPKG_PACKAGES: ${{ inputs.windows_vcpkg_packages }}
        run: |
          git clone https://github.com/microsoft/vcpkg "$env:GITHUB_WORKSPACE\vcpkg"
          & "$env:GITHUB_WORKSPACE\vcpkg\bootstrap-vcpkg.bat"

          foreach ($pkg in $env:VCPKG_PACKAGES.Split(' ', [System.StringSplitOptions]::RemoveEmptyEntries)) {
            & "$env:GITHUB_WORKSPACE\vcpkg\vcpkg.exe" install $pkg --triplet x64-windows
          }

          $ws = $env:GITHUB_WORKSPACE -replace '\\','/'
          "VCPKG_ROOT_CMAKE=$ws/vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Append
          "VCPKG_TOOLCHAIN_CMAKE=$ws/vcpkg/scripts/buildsystems/vcpkg.cmake" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install cibuildwheel
        run: python -m pip install --upgrade pip cibuildwheel

      - name: Build wheels
        working-directory: ${{ inputs.working_directory }}
        env:
          CIBW_ARCHS_WINDOWS: "AMD64"
          CIBW_BUILD: ${{ inputs.cibw_build }}
          CIBW_SKIP: "*-musllinux_*"
          CIBW_ENVIRONMENT_WINDOWS: >-
            VCPKG_ROOT=${{ env.VCPKG_ROOT_CMAKE }}
            CMAKE_TOOLCHAIN_FILE=${{ env.VCPKG_TOOLCHAIN_CMAKE }}
            SKBUILD_CMAKE_ARGS=-DCMAKE_TOOLCHAIN_FILE=${{ env.VCPKG_TOOLCHAIN_CMAKE }} -DVCPKG_TARGET_TRIPLET=x64-windows
        run: python -m cibuildwheel --output-dir dist

      - name: Upload Windows wheels
        uses: actions/upload-artifact@v4
        with:
          name: windows-wheels-${{ inputs.project_name }}
          path: ${{ inputs.working_directory }}/dist/*.whl

  publish:
    needs: [prepare, wheels_windows]
    runs-on: ubuntu-latest
    if: ${{ always() && needs.prepare.result == 'success' && (!inputs.build_windows_wheels || needs.wheels_windows.result == 'success') && inputs.publish_to_pypi }}

    steps:
      - name: Checkout release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.ref }}
          fetch-depth: 0

      - name: Install system dependencies (apt)
        if: ${{ inputs.apt_deps != '' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ inputs.apt_deps }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build poetry

      - name: Build distributions
        working-directory: ${{ inputs.working_directory }}
        env:
          BUILD_COMMAND: ${{ inputs.build_command }}
        run: |
          set -e
          eval "$BUILD_COMMAND"

      - name: Download Windows wheels
        if: ${{ inputs.build_windows_wheels }}
        uses: actions/download-artifact@v4
        with:
          name: windows-wheels-${{ inputs.project_name }}
          path: ${{ inputs.working_directory }}/${{ inputs.packages_dir }}

      - name: Validate PyPI token
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -z "$PYPI_API_TOKEN" ]; then
            echo "Missing PYPI_API_TOKEN"
            exit 1
          fi

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: ${{ inputs.working_directory }}/${{ inputs.packages_dir }}

  sync_develop:
    needs: [prepare, publish]
    runs-on: ubuntu-latest
    if: ${{ inputs.sync_develop_from_main && needs.prepare.result == 'success' && (!inputs.publish_to_pypi || needs.publish.result == 'success') }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync develop from main
        env:
          STABLE_BRANCH: ${{ inputs.stable_branch }}
          DEVELOP_BRANCH: ${{ inputs.develop_branch }}
        run: |
          set -e

          git fetch origin "$STABLE_BRANCH" "$DEVELOP_BRANCH"

          git checkout "$DEVELOP_BRANCH"
          git pull origin "$DEVELOP_BRANCH"

          if git merge-base --is-ancestor "origin/$STABLE_BRANCH" HEAD; then
            echo "$DEVELOP_BRANCH already includes $STABLE_BRANCH"
            exit 0
          fi

          git merge --no-ff "origin/$STABLE_BRANCH" -m "chore: sync $DEVELOP_BRANCH with $STABLE_BRANCH"
          git push origin "$DEVELOP_BRANCH"
