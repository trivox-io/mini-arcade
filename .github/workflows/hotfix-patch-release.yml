name: Hotfix Patch Release

on:
  push:
    branches:
      - main
    paths:
      - "packages/**"
      - "CHANGELOG.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.head_commit.message == '' || !startsWith(github.event.head_commit.message, 'chore(release):') }}
    uses: ./.github/workflows/reusable-release-stack.yml
    with:
      bump_type: patch
      stable_branch: main
      develop_branch: develop
    secrets: inherit