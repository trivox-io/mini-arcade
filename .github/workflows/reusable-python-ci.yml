name: Reusable Python CI

on:
  workflow_call:
    inputs:
      project_name:
        required: true
        type: string
      working_directory:
        required: false
        type: string
        default: "."
      lint_path:
        required: false
        type: string
        default: "src"
      apt_deps:
        required: false
        type: string
        default: ""
      python_versions:
        required: false
        type: string
        default: '["3.9", "3.10", "3.11"]'
      run_pytest:
        required: false
        type: boolean
        default: true
      local_dependency_paths:
        required: false
        type: string
        default: "[]"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.project_name }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJson(inputs.python_versions) }}

    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies (apt)
        if: ${{ inputs.apt_deps != '' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ inputs.apt_deps }}

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install local sibling dependencies
        env:
          LOCAL_DEPENDENCY_PATHS: ${{ inputs.local_dependency_paths }}
        run: |
          python -m pip install --upgrade pip
          python - << 'PY'
          import json
          import os
          import subprocess
          import sys

          dep_paths = json.loads(os.environ["LOCAL_DEPENDENCY_PATHS"])
          for dep_path in dep_paths:
              print(f"Installing local dependency: {dep_path}")
              subprocess.run(
                  [sys.executable, "-m", "pip", "install", "-e", dep_path],
                  check=True,
              )
          PY

      - name: Install current package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run isort
        run: isort --check-only .

      - name: Run black
        run: black --check .

      - name: Run pylint
        run: pylint ${{ inputs.lint_path }}

      - name: Run pytest
        if: ${{ inputs.run_pytest }}
        run: pytest